<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<!-- ปรับ Viewport ป้องกันการซูมหน้าจอแบบมั่วๆ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>SUKI ODAZ — แพลนงานฉบับชิล</title>

<!-- ตั้งค่าไอคอนสำหรับ Add to Homescreen และ Favicon -->
<link rel="icon" href="image_87221c.png" type="image/png">
<link rel="apple-touch-icon" href="image_87221c.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="SUKI ODAZ">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Mitr:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- ... (ส่วน <style> ของคุณอยู่ต่อจากตรงนี้) ... -->
</head>
<style>
  :root{
    --paper:#FBF7F0; --paper-dim:#F3ECE0; --ink:#3A332E; --ink-soft:#77695F; --line:#E7DCC9;
    --card-shadow: 0 3px 10px rgba(58,51,46,.08), 0 1px 2px rgba(58,51,46,.06);
    --c-assignment:#4C7BA8; --c-assignment-bg:#E7EFF6; --c-assignment-dark:#33587D;
    --c-department:#8757A0; --c-department-bg:#F1E9F5; --c-department-dark:#623C77;
    --c-faculty:#C97F1E;    --c-faculty-bg:#FBEFDA;    --c-faculty-dark:#8F5A11;
    --c-club:#3E9468;       --c-club-bg:#E5F3EB;       --c-club-dark:#296B48;
    --c-general:#C15C7C;    --c-general-bg:#FAEBF0;    --c-general-dark:#8C3D57;
    --red:#C0533F; --red-bg:#FBE9E5; --amber:#C98A2E; --amber-bg:#FBF0DC; --green:#3E9468; --green-bg:#E5F3EB;
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(circle at 8% 12%, rgba(201,143,44,.05), transparent 40%),
                radial-gradient(circle at 92% 85%, rgba(135,87,160,.05), transparent 40%), var(--paper);
    color:var(--ink); font-family:'Mitr', sans-serif; font-weight:400; min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;} button{font-family:inherit;cursor:pointer;} input,select,textarea{font-family:inherit;}
  .app{max-width:980px;margin:0 auto;padding:20px 18px 100px;}

  .header{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:46px;height:46px;border-radius:14px; background:linear-gradient(135deg,var(--c-faculty),var(--c-general));
    display:flex;align-items:center;justify-content:center; font-size:22px;flex-shrink:0; transform:rotate(-6deg); box-shadow:var(--card-shadow);
  }
  .brand h1{font-family:'Chonburi', cursive; font-size:28px; margin:0; letter-spacing:.5px; color:var(--ink); line-height:1.1;}
  .brand p{margin:2px 0 0;font-size:13px;color:var(--ink-soft);}

  .tabbar{display:flex;gap:4px;background:var(--paper-dim);padding:5px;border-radius:14px;border:1px solid var(--line);overflow-x:auto;}
  .tabbar button{
    border:none;background:transparent;padding:9px 16px;border-radius:10px; font-size:14px;font-weight:500;color:var(--ink-soft);
    display:flex;align-items:center;gap:6px; transition:.18s; white-space:nowrap;
  }
  .tabbar button.active{background:var(--paper);color:var(--ink);box-shadow:var(--card-shadow);font-weight:600;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 18px;}
  .chip{
    border:1.5px solid var(--line);background:var(--paper); padding:6px 13px;border-radius:999px;font-size:12.5px;font-weight:500;
    color:var(--ink-soft);display:flex;align-items:center;gap:6px; transition:.15s; cursor:pointer;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%;}
  .chip.active{color:#fff;border-color:transparent;}

  .view{display:none;} .view.active{display:block;animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .cal-card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--card-shadow);}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px;}
  .cal-nav h2{font-size:18px;margin:0;font-weight:600;}
  .cal-nav-btns{display:flex;gap:6px;}
  .cal-nav button{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--paper-dim);font-size:16px;color:var(--ink);display:flex;align-items:center;justify-content:center;}
  .cal-nav button:hover{background:var(--line);}
  .cal-today-btn{border:1px solid var(--line);background:var(--paper-dim);border-radius:10px;padding:0 12px;font-size:12.5px;color:var(--ink-soft);font-weight:500;height:34px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:6px;font-weight:600;}
  .weekdays div{padding:6px 0;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .day-cell{border-radius:12px;border:1px solid transparent;background:var(--paper-dim);padding:5px;display:flex;flex-direction:column;position:relative;min-height:85px;transition:.15s; overflow:hidden;}
  .day-cell.empty{background:transparent;}
  .day-cell:not(.empty):hover{border-color:var(--line);background:var(--paper);cursor:pointer;}
  .day-cell .num{font-size:12.5px;font-weight:500;color:var(--ink-soft); margin-bottom:2px;}
  .day-cell.today{background:linear-gradient(135deg,var(--amber-bg),var(--paper));}
  .day-cell.today .num{color:var(--amber);font-weight:700;}
  .day-cell.today::after{content:'';position:absolute;top:7px;right:7px;width:6px;height:6px;border-radius:50%;background:var(--amber);}
  .holiday-label{font-size:9.5px; font-weight:600; color:var(--red); line-height:1.1; margin-bottom:3px; word-break:break-word;}
  .cal-task-pill{font-size:10px; color:#fff; padding:2px 5px; border-radius:5px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;}
  .day-more{font-size:10px; color:var(--ink-soft); font-weight:500; margin-top:auto;}

  .kanban-board{display:flex; gap:16px; overflow-x:auto; padding-bottom:16px; scroll-snap-type: x mandatory; scroll-padding: 0 16px; -webkit-overflow-scrolling: touch;}
  .kanban-col{flex: 1 0 280px; max-width: 350px; background:var(--paper-dim); border-radius:18px; padding:14px; border:2px dashed transparent; transition:.2s ease; display:flex; flex-direction:column; scroll-snap-align: start;}
  @media(min-width:920px){ .kanban-col { max-width: none; } }
  .kanban-col.drag-over{border-color:var(--ink-soft); background:var(--paper);}
  .kanban-col h3{font-size:15.5px;margin:0 0 14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;color:var(--ink);}
  .kanban-col h3 span{font-size:12px;background:var(--line);padding:2px 8px;border-radius:999px;font-weight:500;}
  .kanban-cards{display:flex;flex-direction:column;gap:10px;flex-grow:1;min-height:50px;}
  .task-card[draggable="true"] { cursor: grab; }
  .task-card[draggable="true"]:active { cursor: grabbing; }
  .task-card.dragging { opacity: 0.4; transform: scale(0.96); box-shadow: none; border-color:var(--ink-soft); }

  .empty-state{text-align:center;padding:60px 20px;color:var(--ink-soft);}
  .empty-state .big{font-size:38px;margin-bottom:10px;}
  .empty-state p{margin:4px 0;font-size:14px;}
  .date-group{margin-bottom:22px;}
  .date-group-head{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;padding:0 2px;flex-wrap:wrap;}
  .date-group-head .d{font-size:15px;font-weight:600;}
  .badge{font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;}
  .badge.overdue{background:var(--red-bg);color:var(--red);} .badge.today{background:var(--amber-bg);color:var(--amber);}
  .badge.soon{background:var(--amber-bg);color:var(--amber);} .badge.normal{background:var(--green-bg);color:var(--green);}
  .task-card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px 14px 12px;margin-bottom:10px;box-shadow:var(--card-shadow);position:relative;overflow:hidden; transition: transform .15s, opacity .15s;}
  .task-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:5px;}
  .task-card.assignment::before{background:var(--c-assignment);} .task-card.department::before{background:var(--c-department);}
  .task-card.faculty::before{background:var(--c-faculty);} .task-card.club::before{background:var(--c-club);} .task-card.general::before{background:var(--c-general);}
  .task-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .task-title{font-size:15px;font-weight:600;margin:0 0 4px;padding-left:6px; line-height:1.3;}
  .task-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;margin-left:6px;}
  .task-tag.assignment{background:var(--c-assignment-bg);color:var(--c-assignment-dark);} .task-tag.department{background:var(--c-department-bg);color:var(--c-department-dark);}
  .task-tag.faculty{background:var(--c-faculty-bg);color:var(--c-faculty-dark);} .task-tag.club{background:var(--c-club-bg);color:var(--c-club-dark);}
  .task-tag.general{background:var(--c-general-bg);color:var(--c-general-dark);}
  .task-meta{padding-left:6px;font-size:12.5px;color:var(--ink-soft);line-height:1.6;margin-top:2px;} .task-meta b{color:var(--ink);font-weight:500;}
  .task-link{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:var(--c-assignment-dark);margin-top:6px;text-decoration:none;word-break:break-all;}
  .task-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:var(--paper-dim);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0; cursor:pointer;}
  .icon-btn:hover{background:var(--line);}

  .fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--c-faculty),var(--c-general));color:#fff;border:none;font-size:26px;box-shadow:0 6px 18px rgba(58,51,46,.25);display:flex;align-items:center;justify-content:center;z-index:40;transition:transform .15s;}
  .fab:hover{transform:scale(1.06) rotate(6deg);}

  .overlay{position:fixed;inset:0;background:rgba(58,51,46,.42);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0;}
  .overlay.show{display:flex;}
  @media(min-width:640px){ .overlay{align-items:center;padding:20px;} }
  .modal{background:var(--paper);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:22px 20px 26px;position:relative;box-shadow:0 -10px 40px rgba(0,0,0,.15);}
  @media(min-width:640px){ .modal{border-radius:22px;} }
  .modal h3{margin:0 0 14px;font-size:18px;font-weight:600;}
  .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--paper-dim);font-size:16px;color:var(--ink-soft);cursor:pointer;}
  .field{margin-bottom:14px;} .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
 .field input[type=text], .field input[type=password], .field input[type=date], .field input[type=time], .field input[type=url], .field select, .field textarea {
  width: 100%;
  border: 1.5px solid var(--line);
  background: var(--paper);
  border-radius: 11px;
  padding: 10px 12px;
  font-size: 16px; /* <-- เปลี่ยนตรงนี้เป็น 16px เพื่อแก้บั๊กมือถือซูมเอง */
  color: var(--ink);
}
  .field textarea{resize:vertical;min-height:64px;} .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--c-faculty);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:420px){.row2{grid-template-columns:1fr;}}
  .cat-picker{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px;margin-bottom:16px;}
  .cat-opt{border:1.5px solid var(--line);background:var(--paper);border-radius:13px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11.5px;font-weight:500;color:var(--ink-soft);cursor:pointer;}
  .cat-opt .ic{font-size:18px;} .cat-opt.sel{color:#fff;border-color:transparent;}
  .radio-group{display:flex;gap:8px;flex-wrap:wrap;} .radio-pill{border:1.5px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink-soft);font-weight:500;cursor:pointer;}
  .radio-pill.sel{background:var(--ink);color:#fff;border-color:var(--ink);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
  .btn{flex:1;border:none;border-radius:12px;padding:12px;font-size:14.5px;font-weight:600;}
  .btn-primary{background:var(--ink);color:#fff;} .btn-danger{background:var(--red-bg);color:var(--red);flex:none;padding:12px 16px;} .btn-outline{background:transparent; border:1.5px solid var(--line); color:var(--ink); flex:none; padding:12px 16px;}
  .subj-item{display:flex;justify-content:space-between;align-items:center;background:var(--paper-dim);padding:10px 14px;border-radius:10px;margin-bottom:8px; border:1px solid var(--line);}
  .subj-info{font-size:13.5px;} .subj-code{font-weight:600;color:var(--c-faculty-dark);margin-right:6px;} .subj-del{background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:4px;}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:12px;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:200;box-shadow:0 6px 18px rgba(0,0,0,.2);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-mark">🍡</div>
      <div>
        <h1>SUKI ODAZ</h1>
        <p>แพลนงานเด็กมหาลัย ฉบับชิลๆ ไม่กดดัน</p>
      </div>
    </div>
    <div class="tabbar">
      <button id="tabCalendarBtn" onclick="switchView('calendar')">📅 ปฏิทิน</button>
      <button id="tabKanbanBtn" class="active" onclick="switchView('kanban')">📋 บอร์ดงาน</button>
      <button id="tabListBtn" onclick="switchView('list')">📑 รายการ</button>
      <button id="langToggleBtn" onclick="toggleLanguage()" style="color:var(--c-faculty-dark); font-weight:bold; margin-left:auto;">🇹🇭 TH</button>
      <button id="btnLogout" onclick="logout()" style="color:var(--red);">🚪 ออกจากระบบ</button>
    </div>
  </div>

  <div class="chips" id="filterChips"></div>

  <div class="view" id="view-calendar">
    <div class="cal-card">
      <div class="cal-nav">
        <div class="cal-nav-btns"><button onclick="changeMonth(-1)">‹</button><button onclick="changeMonth(1)">›</button></div>
        <h2 id="calTitle"></h2>
        <button class="cal-today-btn" onclick="goToday()">วันนี้</button>
      </div>
      <div class="weekdays"><div>อา</div><div>จ</div><div>อ</div><div>พ</div><div>พฤ</div><div>ศ</div><div>ส</div></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <div class="view active" id="view-kanban">
    <div class="kanban-board" id="kanbanBoard">
      <div class="kanban-col" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'todo')">
        <h3>To Do (รอก่อน) <span id="count-todo">0</span></h3>
        <div class="kanban-cards" id="col-todo"></div>
      </div>
      <div class="kanban-col" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'in_progress')">
        <h3>In Progress (ปั่นอยู่) <span id="count-in_progress">0</span></h3>
        <div class="kanban-cards" id="col-in_progress"></div>
      </div>
      <div class="kanban-col" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'done')">
        <h3>Done (เสร็จแล้วเว้ย) <span id="count-done">0</span></h3>
        <div class="kanban-cards" id="col-done"></div>
      </div>
    </div>
  </div>

  <div class="view" id="view-list">
    <div id="listContainer"></div>
  </div>

</div>

<button class="fab" onclick="openTaskModal(null, todayStr())" aria-label="เพิ่มงาน">＋</button>

<!-- Modals -->
<div class="overlay" id="dayOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('dayOverlay')">✕</button>
    <h3 id="dayModalTitle"></h3>
    <div id="dayModalList"></div>
    <div class="modal-actions"><button class="btn btn-primary" id="dayModalAddBtn">＋ เพิ่มงานวันนี้</button></div>
  </div>
</div>

<div class="overlay" id="subjectOverlay" style="z-index: 150;">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('subjectOverlay')">✕</button>
    <h3 id="subjModalTitle">จัดการรายวิชา</h3>
    <div id="subjectList" style="margin-bottom: 16px;"></div>
    <div style="background:var(--paper-dim); padding:14px; border-radius:12px; border:1px solid var(--line);">
      <h4 id="subjModalAddTitle" style="margin:0 0 10px; font-size:14px; color:var(--ink);">+ เพิ่มวิชาใหม่</h4>
      <div class="row2">
        <div class="field"><label id="lblSubjCode">รหัสวิชา</label><input type="text" id="s_code" placeholder="เช่น ED401"></div>
        <div class="field"><label id="lblSubjName">ชื่อวิชา</label><input type="text" id="s_name" placeholder="เช่น Teaching Practicum"></div>
      </div>
      <div class="field"><label id="lblSubjTeacher">ชื่ออาจารย์ผู้สอน</label><input type="text" id="s_teacher" placeholder="อ.ประจำวิชา"></div>
      <button class="btn btn-primary" id="btnSaveSubj" style="width:100%; padding:10px;" onclick="addSubject()">บันทึกวิชา</button>
    </div>
  </div>
</div>

<div class="overlay" id="taskOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeOverlay('taskOverlay')">✕</button>
    <h3 id="taskModalTitle">เพิ่มงานใหม่</h3>
    <div class="field"><label id="lblTaskType">ประเภทงาน</label><div class="cat-picker" id="catPicker"></div></div>
    <div class="field"><label id="lblTaskName">ชื่องาน</label><input type="text" id="f_title" placeholder="เช่น ส่งรายงาน หรือ แผนการสอน"></div>
    <div class="row2">
      <div class="field"><label id="lblTaskDate">วันครบกำหนด</label><input type="date" id="f_date"></div>
      <div class="field"><label id="lblTaskTime">เวลา (ถ้ามี)</label><input type="time" id="f_time"></div>
    </div>
    <div id="grp_assignment">
      <div class="field">
        <label style="display:flex; justify-content:space-between; align-items:center;">
          <span id="lblTaskSubj">วิชาเรียน</span>
          <button type="button" class="btn-outline" id="btnManageSubj" style="padding:2px 8px; font-size:11px; border-radius:6px;" onclick="openSubjectModal()">⚙️ จัดการวิชา</button>
        </label>
        <select id="f_subject_select"><option value="">-- เลือกวิชา (หรือไม่ระบุก็ได้) --</option></select>
      </div>
      <div class="field">
        <label id="lblTaskSubmit">วิธีการส่ง</label>
        <select id="f_submit">
          <option value="ส่งออนไลน์ (e-learning/Classroom)" id="optSubmitOnline">ส่งออนไลน์ (e-learning/Classroom)</option>
          <option value="ส่งเอกสาร/กระดาษ" id="optSubmitPaper">ส่งเอกสาร/กระดาษ</option>
          <option value="ส่งทางอีเมล" id="optSubmitEmail">ส่งทางอีเมล</option>
          <option value="อื่นๆ" id="optSubmitOther">อื่นๆ</option>
        </select>
      </div>
      <div class="field">
        <label id="lblTaskWorkType">รูปแบบงาน</label>
        <div class="radio-group" id="workTypeGroup">
          <div class="radio-pill sel" data-v="เดี่ยว" id="radSingle">เดี่ยว</div>
          <div class="radio-pill" data-v="คู่" id="radPair">คู่</div>
          <div class="radio-pill" data-v="กลุ่ม" id="radGroup">กลุ่ม</div>

/* ================= FIREBASE CLOUD SYNC ================= */
function loadData(){ 
  if(!currentUser) return;

  // ดึงข้อมูลวิชาเรียนแบบ Real-time
  db.ref('users/' + currentUser + '/subjects').on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) {
      subjects = data;
    } else {
      subjects = [{id:uid(), code:'ED401', name:'Teaching Practicum', teacher:'อ.นิเทศก์'}];
      saveSubjects();
    }
    refreshSubjectDropdown();
    renderSubjectList();
  });

  // ดึงข้อมูลงานแบบ Real-time
  db.ref('users/' + currentUser + '/tasks').on('value', (snapshot) => {
    const data = snapshot.val();
    tasks = data ? data : [];
    tasks.forEach(t => { if(!t.status) t.status = 'todo'; });
    
    // รีเฟรชหน้าจออัตโนมัติเมื่อเพื่อนหรือเครื่องอื่นมีการขยับงาน
    renderAllViews(); 
  });
}

function persistTasks(){ 
  if(currentUser) {
    db.ref('shared_board/tasks').set(tasks);
  }
} 
function saveSubjects(){ 
  if(currentUser) {
    db.ref('shared_board/subjects').set(subjects);
  }
}

function showAuthAlert(msg, type = "error") {
  const alertEl = document.getElementById('authAlert');
  alertEl.style.display = 'block';
  if (type === "error") {
    alertEl.style.backgroundColor = 'var(--red-bg)';
    alertEl.style.color = 'var(--red)';
  } else {
    alertEl.style.backgroundColor = 'var(--green-bg)';
    alertEl.style.color = 'var(--green)';
  }
  alertEl.textContent = msg;
}

function switchAuthMode(mode) { 
  currentAuthMode = mode; 
  document.getElementById('auth_id').value = ''; 
  document.getElementById('auth_pass').value = ''; 
  document.getElementById('auth_pass2').value = ''; 
  document.getElementById('authAlert').style.display = 'none'; 
  applyLangUI(); 
  document.getElementById('auth_pass2_wrap').style.display = (mode==='login') ? 'none' : 'block'; 
  document.getElementById('authForgotBtn').style.display = (mode==='login') ? 'block' : 'none'; 
}

function handleAuth() {
  const s_id = document.getElementById('auth_id').value.trim(); 
  const s_pass = document.getElementById('auth_pass').value.trim(); 
  const s_pass2 = document.getElementById('auth_pass2').value.trim();
  
  if(!s_id || !s_pass) return showAuthAlert('ใส่ข้อมูลให้ครบก่อนน้าา', 'error');

  // จำลองรหัสนักศึกษาให้กลายเป็น Email เพื่อให้ Firebase Auth ยอมรับ
  const dummyEmail = `${s_id}@sukiodaz.app`;

  if(currentAuthMode === 'register') { 
    if(s_pass !== s_pass2) return showAuthAlert('รหัสผ่าน 2 ช่องไม่ตรงกัน ลองพิมพ์ใหม่น้า', 'error');
    if(s_pass.length < 6) return showAuthAlert('รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษรจ้า', 'error');
    
    // สร้าง User ใน Firebase Auth แบบถูกต้อง
    auth.createUserWithEmailAndPassword(dummyEmail, s_pass)
      .then((userCredential) => {
        showAuthAlert('สมัครสำเร็จ! กำลังพาล็อกอิน 🎉', 'success');
        // ใช้ UID (รหัสสุ่มความปลอดภัยสูง) เป็น Key แทนรหัสนักศึกษา
        setTimeout(() => loginSuccess(userCredential.user.uid), 1200); 
      })
      .catch(err => {
        if(err.code === 'auth/email-already-in-use') {
           showAuthAlert('รหัสนักศึกษานี้ลงทะเบียนไปแล้วจ้า ล็อกอินได้เลย', 'error');
        } else {
           showAuthAlert('เกิดข้อผิดพลาด: ' + err.message, 'error');
        }
      });
  } 
  else if(currentAuthMode === 'login') { 
    auth.signInWithEmailAndPassword(dummyEmail, s_pass)
      .then((userCredential) => {
        showToast('ยินดีต้อนรับกลับมา! 🍡'); 
        loginSuccess(userCredential.user.uid);
      })
      .catch(err => {
        showAuthAlert('รหัสนักศึกษา หรือ รหัสผ่านไม่ถูกต้อง ลองใหม่น้า', 'error');
      });
  } 
  else if(currentAuthMode === 'forgot') { 
     // สำหรับระบบ Email ปลอม การ Reset Password ทางอีเมลจะทำไม่ได้จริง 
     // แนะนำให้ตัดปุ่มลืมรหัสผ่านออก หรือถ้าจะทำต้องทำระบบยืนยันตัวตนแยก (ซึ่งซับซ้อนไปสำหรับโปรเจกต์ชิลๆ)
     showAuthAlert('เนื่องจากระบบใช้รหัสนักศึกษา หากลืมรหัสผ่านโปรดติดต่อ Admin จ้า', 'error');
  }
}

function loginSuccess(uid) { 
  currentUser = uid; 
  // ไม่ต้องใช้ sessionStorage แล้ว เพราะ Firebase Auth จะจำ State ไว้ให้เอง
  document.getElementById('authOverlay').classList.remove('show'); 
  initApp(); 
}

function logout() { 
  auth.signOut().then(() => {
    currentUser = null; 
    document.getElementById('auth_id').value = ''; 
    document.getElementById('auth_pass').value = ''; 
    switchAuthMode('login'); 
    document.getElementById('authOverlay').classList.add('show'); 
    showToast('ออกจากระบบแล้ว บ๊ายบาย 👋');
  });
}

// อัปเดต onload ให้เช็กสถานะการล็อกอินอัตโนมัติจาก Firebase Auth
window.onload = () => { 
  applyLangUI(); 
  
  // ให้ Firebase เป็นคนบอกเองว่ามีใครล็อกอินค้างไว้ไหม
  auth.onAuthStateChanged((user) => {
    if (user) {
      currentUser = user.uid;
      document.getElementById('authOverlay').classList.remove('show'); 
      initApp();
    } else {
      currentUser = null;
      document.getElementById('authOverlay').classList.add('show');
    }
  });
};

/* ================= INIT ================= */
function initApp(){ loadData(); buildFilterChips(); buildCategoryPicker(); const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); document.querySelectorAll('#workTypeGroup .radio-pill').forEach(el=>{ el.addEventListener('click', ()=>{ selectedWorkType = el.dataset.v; document.querySelectorAll('#workTypeGroup .radio-pill').forEach(p=>p.classList.remove('sel')); el.classList.add('sel'); document.getElementById('teammatesField').style.display = (selectedWorkType==='เดี่ยว') ? 'none' : 'block'; }); }); refreshSubjectDropdown(); renderAllViews(); }
function renderAllViews(){ renderCalendar(); renderKanban(); renderList(); }
function switchView(v){ currentView = v; ['calendar', 'kanban', 'list'].forEach(view => { const btn = document.getElementById(view === 'calendar' ? 'tabCalendarBtn' : (view === 'kanban' ? 'tabKanbanBtn' : 'tabListBtn')); if(btn) btn.classList.toggle('active', v === view); document.getElementById('view-'+view).classList.toggle('active', v === view); }); renderAllViews(); }

/* ================= UI BUILDERS ================= */
function buildFilterChips(){ const wrap = document.getElementById('filterChips'); wrap.innerHTML = ''; CAT_KEYS.forEach(key=>{ const cat = CATEGORIES[key]; const chip = document.createElement('div'); chip.className = 'chip ' + (activeFilters.has(key) ? 'active' : ''); chip.style.background = activeFilters.has(key) ? cat.color : 'var(--paper)'; chip.style.borderColor = activeFilters.has(key) ? 'transparent' : cat.color; chip.style.color = activeFilters.has(key) ? '#fff' : 'var(--ink-soft)'; chip.innerHTML = `<span class="dot" style="background:#fff"></span>${cat.icon} ${cat[currentLang]}`; chip.onclick = ()=>{ if(activeFilters.has(key)){ activeFilters.delete(key); } else { activeFilters.add(key); } applyLangUI(); renderAllViews(); }; wrap.appendChild(chip); }); }
function buildCategoryPicker(){ const wrap = document.getElementById('catPicker'); wrap.innerHTML = ''; CAT_KEYS.forEach(key=>{ const cat = CATEGORIES[key]; const opt = document.createElement('div'); opt.className = 'cat-opt'; opt.dataset.key = key; opt.innerHTML = `<span class="ic">${cat.icon}</span><span>${cat[currentLang]}</span>`; opt.onclick = ()=> selectCategory(key); wrap.appendChild(opt); }); selectCategory(selectedCategory); }
function selectCategory(key){ selectedCategory = key; document.querySelectorAll('.cat-opt').forEach(el=>{ const cat = CATEGORIES[el.dataset.key]; if(el.dataset.key === key){ el.classList.add('sel'); el.style.background = cat.color; el.style.borderColor = cat.color; }else{ el.classList.remove('sel'); el.style.background = 'var(--paper)'; el.style.borderColor = 'var(--line)'; } }); document.getElementById('grp_assignment').style.display = key==='assignment' ? 'block' : 'none'; document.getElementById('grp_org').style.display = ['department','faculty','club'].includes(key) ? 'block' : 'none'; }
function refreshSubjectDropdown(){ const sel = document.getElementById('f_subject_select'); const l = LANG[currentLang]; sel.innerHTML = `<option value="">${l.optSelectSubj}</option>`; subjects.forEach(s => { sel.innerHTML += `<option value="${s.id}">[${escapeHtml(s.code)}] ${escapeHtml(s.name)}</option>`; }); }
function openSubjectModal(){ renderSubjectList(); document.getElementById('subjectOverlay').classList.add('show'); }
function renderSubjectList(){ const list = document.getElementById('subjectList'); const l = LANG[currentLang]; if(subjects.length === 0){ list.innerHTML = `<p style="font-size:13px; color:var(--ink-soft); text-align:center;">${l.emptySubj}</p>`; return; } list.innerHTML = subjects.map(s => `<div class="subj-item"><div class="subj-info"><span class="subj-code">${escapeHtml(s.code)}</span><span>${escapeHtml(s.name)}</span><div style="font-size:11.5px; color:var(--ink-soft); margin-top:2px;">${l.cardTeacher} ${escapeHtml(s.teacher)}</div></div><button class="subj-del" onclick="deleteSubject('${s.id}')">✕</button></div>`).join(''); }
function addSubject(){ const code = document.getElementById('s_code').value.trim(); const name = document.getElementById('s_name').value.trim(); const teacher = document.getElementById('s_teacher').value.trim(); if(!name){ return showToast('ระบุชื่อวิชาก่อนนะ'); } subjects.push({ id: uid(), code, name, teacher }); saveSubjects(); refreshSubjectDropdown(); renderSubjectList(); document.getElementById('s_code').value = ''; document.getElementById('s_name').value = ''; document.getElementById('s_teacher').value = ''; showToast('เพิ่มวิชาเรียบร้อย!'); }
function deleteSubject(id){ if(confirm((currentLang==='th')?'ลบวิชานี้ไหม?':'Delete this subject?')){ subjects = subjects.filter(s => s.id !== id); saveSubjects(); refreshSubjectDropdown(); renderSubjectList(); } }

/* ================= VIEWS ================= */
function changeMonth(delta){ calMonth += delta; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function goToday(){ const now = new Date(); calYear = now.getFullYear(); calMonth = now.getMonth(); renderCalendar(); }
function tasksForDate(dateStr){ return tasks.filter(t=> t.dueDate === dateStr && activeFilters.has(t.category)).sort((a,b)=> (a.dueTime||'99:99').localeCompare(b.dueTime||'99:99')); }
function renderCalendar(){ const l = LANG[currentLang]; document.getElementById('calTitle').textContent = `${l.months[calMonth]} ${calYear + l.yearOffset}`; const grid = document.getElementById('calGrid'); grid.innerHTML = ''; const firstDay = new Date(calYear, calMonth, 1).getDay(); const daysInMonth = new Date(calYear, calMonth+1, 0).getDate(); const today = todayStr(); for(let i=0;i<firstDay;i++){ const empty = document.createElement('div'); empty.className = 'day-cell empty'; grid.appendChild(empty); } for(let d=1; d<=daysInMonth; d++){ const monthDayKey = `${pad(calMonth+1)}-${pad(d)}`; const dateStr = `${calYear}-${monthDayKey}`; const cell = document.createElement('div'); cell.className = 'day-cell' + (dateStr===today ? ' today' : ''); let html = `<div class="num">${d}</div>`; if(currentLang === 'th' && THAI_HOLIDAYS[monthDayKey]){ html += `<div class="holiday-label">${THAI_HOLIDAYS[monthDayKey]}</div>`; } const dayTasks = tasksForDate(dateStr); dayTasks.slice(0,3).forEach(t => { const cat = CATEGORIES[t.category]; html += `<div class="cal-task-pill" style="background:${cat.color}">${escapeHtml(t.title)}</div>`; }); if(dayTasks.length > 3) html += `<div class="day-more">+${dayTasks.length-3}</div>`; cell.innerHTML = html; cell.onclick = ()=> openDayModal(dateStr); grid.appendChild(cell); } }
function openDayModal(dateStr){ const l = LANG[currentLang]; dayModalDate = dateStr; const d = parseDate(dateStr); const label = `${d.getDate()} ${l.months[d.getMonth()]} ${d.getFullYear() + l.yearOffset}`; document.getElementById('dayModalTitle').textContent = label; const list = tasksForDate(dateStr); const container = document.getElementById('dayModalList'); if(list.length===0){ container.innerHTML = `<div class="empty-state" style="padding:24px 0;">${l.emptyDay}</div>`; } else{ container.innerHTML = list.map(t=>renderTaskCard(t, false, false)).join(''); } document.getElementById('dayModalAddBtn').onclick = ()=>{ closeOverlay('dayOverlay'); openTaskModal(null, dateStr); }; document.getElementById('dayOverlay').classList.add('show'); }

function renderKanban(){ const visible = tasks.filter(t=>activeFilters.has(t.category)); const cols = { todo: [], in_progress: [], done: [] }; visible.forEach(t => { if(!t.status) t.status = 'todo'; if(cols[t.status]) cols[t.status].push(t); else cols['todo'].push(t); }); Object.keys(cols).forEach(status => { document.getElementById(`count-${status}`).textContent = cols[status].length; document.getElementById(`col-${status}`).innerHTML = cols[status].map(t => renderTaskCard(t, false, true)).join(''); }); }
function handleDragStart(e, id){ draggedTaskId = id; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); setTimeout(() => e.target.classList.add('dragging'), 0); }
function handleDragEnd(e){ e.target.classList.remove('dragging'); draggedTaskId = null; document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over')); }
function handleDragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e, status){ e.preventDefault(); e.currentTarget.classList.remove('drag-over'); const id = e.dataTransfer.getData('text/plain') || draggedTaskId; if(id){ const task = tasks.find(t => t.id === id); if(task && task.status !== status){ task.status = status; persistTasks(); renderAllViews(); } } }

function renderList(){ const l = LANG[currentLang]; const container = document.getElementById('listContainer'); const visible = tasks.filter(t=>activeFilters.has(t.category)); if(visible.length===0){ container.innerHTML = `<div class="empty-state">${l.emptyList}</div>`; return; } const sorted = [...visible].sort((a,b)=>{ const cmp = a.dueDate.localeCompare(b.dueDate); return cmp!==0 ? cmp : (a.dueTime||'99:99').localeCompare(b.dueTime||'99:99'); }); const groups = {}; sorted.forEach(t=>{ if(!groups[t.dueDate]) groups[t.dueDate] = []; groups[t.dueDate].push(t); }); let html = ''; Object.keys(groups).forEach(dateStr=>{ const d = parseDate(dateStr); const label = `${d.getDate()} ${l.months[d.getMonth()]} ${d.getFullYear() + l.yearOffset}`; const diff = daysBetween(dateStr); let badgeClass, badgeText; if(diff < 0){ badgeClass='overdue'; badgeText=`${l.overdue} ${Math.abs(diff)} ${l.daysUnit}`; } else if(diff === 0){ badgeClass='today'; badgeText=l.todayLabel; } else if(diff === 1){ badgeClass='soon'; badgeText=l.tmrLabel; } else if(diff <= 3){ badgeClass='soon'; badgeText=`${l.inDays} ${diff} ${l.daysUnit}`; } else{ badgeClass='normal'; badgeText=`${l.inDays} ${diff} ${l.daysUnit}`; } html += `<div class="date-group"><div class="date-group-head"><span class="d">${label}</span><span class="badge ${badgeClass}">${badgeText}</span></div>${groups[dateStr].map(t=>renderTaskCard(t, true, false)).join('')}</div>`; }); container.innerHTML = html; }

function renderTaskCard(t, withShift, isDraggable){
  const cat = CATEGORIES[t.category]; const l = LANG[currentLang]; let metaLines = [];
  if(t.category==='assignment'){ if(t.subject) metaLines.push(`<b>${l.cardSubj}</b> ${escapeHtml(t.subject)}`); if(t.teacher) metaLines.push(`<b>${l.cardTeacher}</b> ${escapeHtml(t.teacher)}`); if(t.submitMethod) metaLines.push(`<b>${l.cardSubmit}</b> ${escapeHtml(translateSys(t.submitMethod))}`); if(t.workType) metaLines.push(`<b>${l.cardType}</b> ${escapeHtml(translateSys(t.workType))}${t.teammates ? ' — '+escapeHtml(t.teammates) : ''}`); }
  else if(['department','faculty','club'].includes(t.category)){ if(t.responsible) metaLines.push(`<b>${l.cardResp}</b> ${escapeHtml(t.responsible)}`); if(t.location) metaLines.push(`<b>${l.cardLoc}</b> ${escapeHtml(t.location)}`); }
  if(isDraggable){ const d = parseDate(t.dueDate); metaLines.unshift(`<b>${l.cardDue}</b> ${d.getDate()} ${l.months[d.getMonth()].substring(0,3)} ${t.dueTime ? t.dueTime+' น.' : ''}`); } else { if(t.dueTime) metaLines.push(`<b>${l.cardTime}</b> ${escapeHtml(t.dueTime)}`); }
  if(t.notes) metaLines.push(escapeHtml(t.notes));
  const linkHtml = t.link ? `<a class="task-link" href="${escapeHtml(t.link)}" target="_blank" rel="noopener">${l.openLink}</a>` : '';
  const shiftHtml = withShift ? `<div class="task-shift" style="display:flex; gap:4px; margin-top:8px; padding-left:6px;"><button style="font-size:11px; border:1px solid var(--line); background:var(--paper-dim); border-radius:8px; padding:4px 8px; color:var(--ink-soft); font-weight:500; cursor:pointer;" onclick="shiftTask('${t.id}',-1)">${l.shiftEarly}</button><button style="font-size:11px; border:1px solid var(--line); background:var(--paper-dim); border-radius:8px; padding:4px 8px; color:var(--ink-soft); font-weight:500; cursor:pointer;" onclick="shiftTask('${t.id}',1)">${l.shiftLate}</button></div>` : '';
  const dragAttrs = isDraggable ? `draggable="true" ondragstart="handleDragStart(event, '${t.id}')" ondragend="handleDragEnd(event)"` : '';
  return `<div class="task-card ${t.category}" ${dragAttrs}><div class="task-top"><div style="min-width:0; width:100%;"><div class="task-title">${escapeHtml(t.title)}<span class="task-tag ${t.category}">${cat.icon} ${cat[currentLang]}</span></div>${metaLines.length ? `<div class="task-meta">${metaLines.join('<br>')}</div>` : ''}${linkHtml}</div><div class="task-actions"><button class="icon-btn" onclick="openTaskModal('${t.id}')" title="Edit">✏️</button></div></div>${shiftHtml}</div>`;
}

function shiftTask(id, delta){ const t = tasks.find(x=>x.id===id); if(!t) return; const d = parseDate(t.dueDate); d.setDate(d.getDate()+delta); t.dueDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; persistTasks(); renderAllViews(); showToast('ย้ายวันเรียบร้อย 👍'); }
function quickDelete(id){ if(confirm((currentLang==='th')?'ลบงานนี้เลยไหม?':'Delete this task?')){ tasks = tasks.filter(t=>t.id!==id); persistTasks(); renderAllViews(); showToast('ลบงานแล้ว'); } }

function openTaskModal(taskId, prefillDate){

    document.getElementById('teammatesField').style.display = (selectedWorkType==='เดี่ยว') ? 'none' : 'block'; document.getElementById('f_teammates').value = t.teammates || ''; document.getElementById('f_responsible').value = t.responsible || ''; document.getElementById('f_location').value = t.location || ''; document.getElementById('f_link').value = t.link || ''; document.getElementById('f_notes').value = t.notes || '';
  }else{
    selectCategory('assignment'); document.getElementById('f_title').value = ''; document.getElementById('f_date').value = prefillDate || todayStr(); document.getElementById('f_time').value = ''; document.getElementById('f_subject_select').value = ''; document.getElementById('f_submit').value = 'ส่งออนไลน์ (e-learning/Classroom)'; selectedWorkType = 'เดี่ยว';
    document.querySelectorAll('#workTypeGroup .radio-pill').forEach(p=>p.classList.toggle('sel', p.dataset.v==='เดี่ยว')); document.getElementById('teammatesField').style.display = 'none'; document.getElementById('f_teammates').value = ''; document.getElementById('f_responsible').value = ''; document.getElementById('f_location').value = ''; document.getElementById('f_link').value = ''; document.getElementById('f_notes').value = '';
  } document.getElementById('taskOverlay').classList.add('show');
}
function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }
function saveTask(){
  const title = document.getElementById('f_title').value.trim(); const dueDate = document.getElementById('f_date').value;
  if(!title){ return showToast('ใส่ชื่องานก่อนนะ'); } if(!dueDate){ return showToast('เลือกวันครบกำหนดด้วยนะ'); }
  const data = { id: editingTaskId || uid(), category: selectedCategory, title, dueDate, dueTime: document.getElementById('f_time').value || '', link: document.getElementById('f_link').value.trim(), notes: document.getElementById('f_notes').value.trim(), status: editingTaskId ? tasks.find(t=>t.id===editingTaskId).status : 'todo' };
  if(selectedCategory==='assignment'){ const subjId = document.getElementById('f_subject_select').value; const subj = subjects.find(s => s.id === subjId); if(subj){ data.subject = `[${subj.code}] ${subj.name}`; data.teacher = subj.teacher; } else { data.subject = ''; data.teacher = ''; } data.submitMethod = document.getElementById('f_submit').value; data.workType = selectedWorkType; data.teammates = selectedWorkType==='เดี่ยว' ? '' : document.getElementById('f_teammates').value.trim(); }
  else if(['department','faculty','club'].includes(selectedCategory)){ data.responsible = document.getElementById('f_responsible').value.trim(); data.location = document.getElementById('f_location').value.trim(); }
  if(editingTaskId){ const idx = tasks.findIndex(t=>t.id===editingTaskId); tasks[idx] = data; }else{ tasks.push(data); } persistTasks(); closeOverlay('taskOverlay'); renderAllViews(); showToast(editingTaskId ? 'แก้ไขงานเรียบร้อย ✏️' : 'เพิ่มงานเรียบร้อย 🎉'); editingTaskId = null;
}
function deleteCurrentTask(){ if(editingTaskId) quickDelete(editingTaskId); closeOverlay('taskOverlay'); editingTaskId = null; }

  /* ================= UI ENHANCEMENTS ================= */
// ทำให้กดพื้นที่สีเทาข้างนอก Modal แล้วเป็นการปิดหน้าต่าง (ให้ความรู้สึกเหมือนใช้แอป)
window.addEventListener('click', function(event) {
  // ตรวจสอบว่าสิ่งที่คลิกคือคลาส overlay หรือไม่
  if (event.target.classList.contains('overlay')) {
    // ยกเว้นหน้า authOverlay (หน้าล็อกอิน) ที่ไม่ให้กดปิดได้
    if (event.target.id !== 'authOverlay') {
      event.target.classList.remove('show');
      // ถ้ากำลังเพิ่มงานค้างไว้ แล้วเผลอกดปิด ให้เคลียร์สถานะด้วย
      if(event.target.id === 'taskOverlay') {
        editingTaskId = null;
      }
    }
  }
});
</script>
